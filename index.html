<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles Optimizer</title>
<meta name="description" content="Vind de beste Flying Blue miles deals. Altijd actueel.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede6;
  --muted: #5a6270;
  --muted2: #8a9099;
  --accent: #00b4ff;
  --accent-dim: rgba(0,180,255,0.12);
  --hot: #ff3b3b;
  --hot-dim: rgba(255,59,59,0.15);
  --green: #1db954;
  --green-dim: rgba(29,185,84,0.15);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.15);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.15);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* Top nav */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.nav-logo svg { color: var(--accent); }
.nav-meta {
  font-size: 12px;
  color: var(--muted);
}
.nav-meta span { color: var(--accent); }

/* Main */
main { max-width: 1280px; margin: 0 auto; padding: 32px 32px 80px; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--border2); }
.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
}
.stat-value.blue { color: var(--accent); }
.stat-value.red { color: var(--hot); }
.stat-value.amber { color: var(--amber); }
.stat-value.green { color: var(--green); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.pill {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

.controls-right { display: flex; gap: 10px; align-items: center; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 220px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 14px 8px 36px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, width 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); width: 280px; }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
  width: 15px; height: 15px;
}
.sort-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--muted2);
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}
.sort-select:focus { border-color: var(--accent); }

/* Results meta */
.results-meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
.results-meta b { color: var(--text); font-weight: 600; }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

@media (max-width: 1024px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } main { padding: 20px 16px 60px; } nav { padding: 14px 16px; } }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card:hover { border-color: var(--border2); transform: translateY(-2px); }
.card.is-hot { border-left: 3px solid var(--hot); }
.card.is-always { border-left: 3px solid var(--green); }
.card.is-new { border-left: 3px solid var(--purple); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.miles-badge {
  font-size: 12px;
  font-weight: 700;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(0,180,255,0.25);
  border-radius: 100px;
  padding: 4px 12px;
  white-space: nowrap;
  letter-spacing: -0.01em;
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.card-desc {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.55;
  flex: 1;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 5px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.tag-hot { background: var(--hot-dim); color: var(--hot); }
.tag-temp { background: var(--hot-dim); color: var(--hot); }
.tag-always { background: var(--green-dim); color: var(--green); }
.tag-new { background: var(--purple-dim); color: var(--purple); }
.tag-partner { background: var(--surface2); color: var(--muted2); }
.tag-tier { background: var(--accent-dim); color: var(--accent); }

.expires {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.expires.urgent { color: var(--hot); }

/* Loading / error */
.state-box {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
  font-size: 14px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  margin-top: 64px;
  padding-top: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  line-height: 2;
}
footer a { color: var(--muted); text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2c-.5.1-.9.5-.9 1 0 .3.1.6.3.8l2.9 3-.9 4.4c-.1.5.1 1 .5 1.3.3.2.6.3.9.3.2 0 .4 0 .6-.1l3.9-1.7 2.9 3c.2.2.5.3.8.3.5 0 .9-.4 1-.9z"/></svg>
    Miles Optimizer
  </div>
  <div class="nav-meta">Bijgewerkt: <span id="updated">laden...</span></div>
</nav>

<main>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total deals</div><div class="stat-value blue" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Hot right now</div><div class="stat-value red" id="s-hot">—</div></div>
    <div class="stat-card"><div class="stat-label">Expiring soon</div><div class="stat-value amber" id="s-expiring">—</div></div>
    <div class="stat-card"><div class="stat-label">Always on</div><div class="stat-value green" id="s-always">—</div></div>
  </div>

  <div class="controls">
    <div class="filter-pills">
      <button class="pill active" onclick="setCategory('all',this)">All</button>
      <button class="pill" onclick="setCategory('flight',this)">✈ Flights</button>
      <button class="pill" onclick="setCategory('hotel',this)">🏨 Hotels</button>
      <button class="pill" onclick="setCategory('car',this)">🚗 Car</button>
      <button class="pill" onclick="setCategory('shopping',this)">🛍 Shopping</button>
      <button class="pill" onclick="setCategory('dining',this)">🍽 Dining</button>
      <button class="pill" onclick="setCategory('finance',this)">💳 Finance</button>
    </div>
    <div class="controls-right">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search deals..." oninput="render()">
      </div>
      <select class="sort-select" id="sort" onchange="render()">
        <option value="hot">Newest</option>
        <option value="expires">Expiring soon</option>
        <option value="miles">Most miles</option>
      </select>
    </div>
  </div>

  <div class="results-meta"><b id="count">—</b> deals found</div>

  <div class="cards-grid" id="cards">
    <div class="state-box"><div class="spinner"></div>Loading deals...</div>
  </div>

  <footer>
    <p>Independent tool — not affiliated with Air France-KLM or Flying Blue.</p>
    <p>Always verify terms at <a href="https://flyingblue.com" target="_blank">flyingblue.com</a> before booking.</p>
    <p style="margin-top:4px">© 2026 Miles Optimizer</p>
  </footer>
</main>

<script>
const ICONS = { flight:'✈️', hotel:'🏨', car:'🚗', shopping:'🛍️', dining:'🍽️', finance:'💳' };
let DATA = [];
let activeCategory = 'all';

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function fmtExpiry(d) {
  const days = daysUntil(d);
  if (days === null) return null;
  if (days <= 0) return { label: 'Expired', urgent: true };
  if (days < 1) return { label: 'Today', urgent: true };
  const h = Math.floor((new Date(d) - new Date()) / 3600000);
  if (h < 48) return { label: `${h}h`, urgent: true };
  return { label: `${days}d`, urgent: days <= 7 };
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;

  let cards = DATA.filter(d => {
    const matchCat = activeCategory === 'all' || d.category === activeCategory;
    const matchQ = !q || d.title.toLowerCase().includes(q) || d.partner.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (sort === 'expires') {
    cards.sort((a,b) => {
      const da = daysUntil(a.expires), db = daysUntil(b.expires);
      if (da===null) return 1; if (db===null) return -1;
      return da - db;
    });
  } else if (sort === 'hot') {
    cards.sort((a,b) => (b.hot?1:0)-(a.hot?1:0));
  }

  document.getElementById('s-total').textContent = DATA.length;
  document.getElementById('s-hot').textContent = DATA.filter(d=>d.hot).length;
  document.getElementById('s-expiring').textContent = DATA.filter(d=>{ const x=daysUntil(d.expires); return x!==null&&x<=14&&x>0; }).length;
  document.getElementById('s-always').textContent = DATA.filter(d=>d.type==='always').length;
  document.getElementById('count').textContent = cards.length;

  const el = document.getElementById('cards');
  if (!cards.length) {
    el.innerHTML = '<div class="state-box">No deals found for this filter.</div>';
    return;
  }

  el.innerHTML = cards.map(c => {
    const exp = fmtExpiry(c.expires);
    const cardClass = c.hot ? 'card is-hot' : c.type==='always' ? 'card is-always' : c.type==='new' ? 'card is-new' : 'card';

    const typeTag = c.hot ? '<span class="tag tag-hot">HOT</span>' : '';
    const statusTag = c.type==='temp' ? '<span class="tag tag-temp">Limited time</span>'
                    : c.type==='new'  ? '<span class="tag tag-new">New</span>'
                    : '<span class="tag tag-always">Always on</span>';
    const tierTag = c.tier && c.tier!=='all' ? `<span class="tag tag-tier">${c.tier}+</span>` : '';
    const expHtml = exp ? `<span class="expires${exp.urgent?' urgent':''}">⌛ ${exp.label}</span>` : '';

    return `<div class="${cardClass}">
      <div class="card-top">
        <div class="card-icon">${ICONS[c.category]||'⭐'}</div>
        <div class="miles-badge">${c.miles}</div>
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-desc">${c.description}</div>
      <div class="card-footer">
        <div class="tags">${typeTag}${statusTag}<span class="tag tag-partner">${c.partner}</span>${tierTag}</div>
        ${expHtml}
      </div>
    </div>`;
  }).join('');
}

async function loadData() {
  try {
    const res = await fetch('/api/promotions');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    DATA = json.promotions;
    const d = new Date(json.updatedAt);
    document.getElementById('updated').textContent = d.toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    render();
  } catch(e) {
    document.getElementById('cards').innerHTML = `<div class="state-box" style="color:#ff3b3b">⚠ Could not load data: ${e.message}</div>`;
    document.getElementById('updated').textContent = 'error';
  }
}

loadData();
</script>
</body>
</html>
