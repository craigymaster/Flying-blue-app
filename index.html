<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles Optimizer</title>
<meta name="description" content="Find the best Flying Blue deals and maximize your miles value.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL STYLES (unchanged except small additions) */
body { font-family: 'Inter', sans-serif; background:#f2f1ed; margin:0; }

.hero { text-align:center; padding:60px 20px 30px; }
.hero-title { font-size:56px; font-weight:800; }
.hero-sub { color:#666; margin-top:10px; }

.btn-primary {
  background:#0070f3;
  color:white;
  border:none;
  border-radius:999px;
  padding:12px 22px;
  font-weight:600;
  cursor:pointer;
}

.main { max-width:1100px; margin:auto; padding:20px; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px; }
.stat { background:white; padding:20px; border-radius:12px; }
.stat-label { font-size:12px; color:#666; }
.stat-value { font-size:28px; font-weight:700; }

.cards { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

.card {
  background:white;
  padding:16px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}
.card:hover { transform:translateY(-3px); }

.best-box {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-title">Maximize your Flying Blue miles</div>
  <div class="hero-sub">Find the highest-value deals instantly. Stop wasting miles on low returns.</div>
  <button class="btn-primary" onclick="window.scrollTo({top:600,behavior:'smooth'})">
    View best deals
  </button>
</div>

<div class="main">

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="stat-label">Best deal today</div>
    <div class="stat-value" id="s-best">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Avg miles</div>
    <div class="stat-value" id="s-avg">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Hot deals</div>
    <div class="stat-value" id="s-hot">—</div>
  </div>
  <div class="stat" id="expiring-box">
    <div class="stat-label">Ending soon</div>
    <div class="stat-value" id="s-expiring">—</div>
  </div>
</div>

<!-- BEST PICKS -->
<div id="best-picks"></div>

<!-- SORT -->
<select id="sort" onchange="render()">
  <option value="miles">Best value</option>
  <option value="hot">Hot</option>
  <option value="expires">Ending soon</option>
</select>

<!-- CARDS -->
<div class="cards" id="cards"></div>

</div>

<script>

let DATA = [];

function render(){

  const sort = document.getElementById('sort').value;

  const milesValues = DATA.map(d => parseInt(d.miles)||0).filter(v=>v>0);
  const best = Math.max(...milesValues,0);
  const avg = milesValues.length ? Math.round(milesValues.reduce((a,b)=>a+b,0)/milesValues.length) : 0;

  const expiring = DATA.filter(d=>{
    if(!d.expires) return false;
    return (new Date(d.expires)-new Date())/86400000 < 14;
  }).length;

  document.getElementById('s-best').textContent = best + " miles";
  document.getElementById('s-avg').textContent = avg + " miles";
  document.getElementById('s-hot').textContent = DATA.filter(d=>d.hot).length;
  document.getElementById('s-expiring').textContent = expiring;

  document.getElementById('expiring-box').style.display = expiring ? 'block':'none';

  let cards = [...DATA];

  if(sort==="miles") cards.sort((a,b)=>(parseInt(b.miles)||0)-(parseInt(a.miles)||0));
  if(sort==="hot") cards.sort((a,b)=>(b.hot?1:0)-(a.hot?1:0));
  if(sort==="expires") cards.sort((a,b)=>new Date(a.expires)-new Date(b.expires));

  renderBest();

  document.getElementById('cards').innerHTML = cards.map(c=>{

    const high = parseInt(c.miles) >= 50;

    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;">
        <strong>${c.title}</strong>
        <div style="text-align:right;">
          <div style="font-size:20px;font-weight:800;color:${high?'red':'#0070f3'}">${c.miles}</div>
          <div style="font-size:11px;color:#999">miles / €10</div>
        </div>
      </div>
      <div style="color:#666;margin-top:6px;">
        ${c.description}
        ${high ? '<br><b style="color:green">High value deal</b>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderBest(){
  const best = [...DATA]
    .sort((a,b)=>(parseInt(b.miles)||0)-(parseInt(a.miles)||0))
    .slice(0,3);

  document.getElementById('best-picks').innerHTML = `
    <div class="best-box">
      <strong>Best deals right now</strong>
      ${best.map(d=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;">
          <span>${d.title}</span>
          <strong>${d.miles}</strong>
        </div>
      `).join('')}
    </div>
  `;
}

/* DEMO DATA */
DATA = [
  {title:"Tommy Hilfiger", miles:66, description:"Boosted deal", hot:true},
  {title:"Agoda", miles:49, description:"Travel booking", hot:true},
  {title:"Adidas", miles:44, description:"Clothing", hot:false}
];

render();

</script>

</body>
</html>
